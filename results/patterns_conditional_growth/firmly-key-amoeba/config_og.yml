# Configuration file for pattern NCA training
task: "patterns_conditional_growth"
# task: "patterns_morphing"
# task: "patterns_translation"

# target_patterns: Can be either:
#   - Folder path (ending with /): "datasets/emojis/"
#   - List of PNG paths: ["path/image1.png", "path/image2.png"]
#   - List of pattern unicode: ["🦋", "⭐", "🌸"]

target_patterns: "datasets/emojis/"
# target_patterns: "datasets/single_emojis_wFields/beetle/"
