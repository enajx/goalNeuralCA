# target_patterns: ["datasets/emojis/bug.png", "datasets/emojis/star.png", "datasets/emojis/microbe.png"]
# target_patterns: ["🦋"]
# target_patterns: [ "⭐"]
# target_patterns: [ "🌸"]
# target_patterns: ["🌸","⭐"]
# target_patterns: ["🌸","⭐","🌼"]
# target_patterns: ["🕸️", "🌼", "⭐", "❄️", "🌸"]
# target_patterns: ["🍀", "🏵️"]
